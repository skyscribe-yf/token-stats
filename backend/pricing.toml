# Token pricing configuration
# 汇率：1 USD = ? CNY（人民币）
usd_to_cny = 6.82
rate_date = "2026-05-20"

# 特殊计费规则（直接以人民币计价）
[special]
# 讯飞订阅：199 元 / 90000 次调用
xunfei_per_call = 0.002211111111

# Kimi CLI：199 元 / 28 亿 Token（2_800_000_000）
kimi_per_token = 0.000000071071429

# Xiaomi MiMo TP：99 元 / ~1.05 亿 Token（105,222,222）
# 实测：9.47M token = 9% 使用量 → 总容量 ≈ 9.47M ÷ 0.09 ≈ 105.22M
# per_token = 99 / 105,222,222 ≈ 0.000000940905
xiaomi_mimo_tp_per_token = 0.000000940905

# OpenCode 折扣：官方 10 美金可用 60 美金额度，实际成本 = 原始 cost / 6
opencode_divisor = 6.0

# Ainaba (AI奶爸) 折扣：按时间段分段
# 5月25日22:30(UTC+8)之前：40倍
# 5月25日22:30(UTC+8)之后：25倍
# 分段按 `before` 时间匹配：记录时间 < before 则使用该段 divisor
# 最后一段不加 `before` 作为兜底（当前费率）
ainaba_segments = [
    { before = "2025-05-25T22:30:00+08:00", divisor = 40.0 },
    { divisor = 25.0 },
]

# FreeModel 折扣：1 USD 面值 = 0.1 CNY 实际成本，divisor = 6.82 / 0.1 = 68.2
freemodel_divisor = 68.2

# CommandCode 订阅折扣：实际成本 = 列出价格 / 10
commandcode_divisor = 10.0

# 模型价格（USD per 1_000_000 tokens）
# 用于 codex/claude-code 等无原始 cost 的源，从 token 用量计算
# cache_write 对 OpenAI 模型等于 input（首次缓存按正常输入计费）
# 对 Anthropic 模型约为 input * 1.25（5 分钟缓存）
[[model]]
name = "gpt-5.5"
input = 5.00
output = 30.00
cache_read = 0.50
cache_write = 5.00

[[model]]
name = "gpt-5.5"
tier_threshold = 272000
input = 10.00
output = 45.00
cache_read = 1.00
cache_write = 10.00

[[model]]
name = "gpt-5.4"
input = 2.50
output = 15.00
cache_read = 0.25
cache_write = 2.50

[[model]]
name = "gpt-5.4"
tier_threshold = 272000
input = 5.00
output = 22.50
cache_read = 0.50
cache_write = 5.00

[[model]]
name = "gpt-5.4-mini"
input = 0.75
output = 4.50
cache_read = 0.075
cache_write = 0.75

[[model]]
name = "claude-sonnet-4-6"
input = 3.00
output = 15.00
cache_read = 0.30
cache_write = 3.75

[[model]]
name = "claude-opus-4-7"
input = 5.00
output = 25.00
cache_read = 0.50
cache_write = 6.25

[[model]]
name = "claude-haiku-4-5"
input = 1.00
output = 5.00
cache_read = 0.10
cache_write = 1.25

# DeepSeek 模型价格（USD per 1_000_000 tokens）
# 官方定价（CNY）：v4-pro input=4, cache_read=0.4, output=16
#                     v4-flash input=1, cache_read=0.1, output=4
# 转换为 USD：CNY / 6.82
# 用于 claude-code 等无原始 cost 的源
[[model]]
name = "deepseek-v4-pro"
input = 0.5865
output = 2.346
cache_read = 0.05865
cache_write = 0.5865

[[model]]
