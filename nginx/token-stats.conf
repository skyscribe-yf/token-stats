upstream token_stats_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 8081;
    server_name localhost;

    access_log /var/log/nginx/token-stats-access.log;
    error_log /var/log/nginx/token-stats-error.log;

    # Gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1000;

    # API routes proxy to Rust backend
    location /api/ {
        proxy_pass http://token_stats_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # Static files served from nginx-accessible directory
    location / {
        root /var/www/token-stats;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
    }
}
